name: "🧪 Test"

on:
  pull_request:
  push:
    branches:
      - "main"
      - "releases"

jobs:
  test:
    name:
      "${{
        (startswith(matrix.runner, 'ubuntu') && 'Linux')
        || (startswith(matrix.runner, 'macos') && 'macOS')
        || (startswith(matrix.runner, 'windows') && 'Windows')
      }}"

    strategy:
      matrix:
        include:
          # Test extensively on Linux.
          - runner: "ubuntu-24.04"
            cpythons:
              - "3.10"
              - "3.11"
              - "3.12"
              - "3.13"
              - "3.14"
            pypys:
              - "3.11"
            tox-post-environments:
              - "mypy-py3.10"
              - "mypy-py3.14"
              - "py3.10-minimum_dependencies"
              - "py3.10-http-lxml"
              - "py3.14-http-lxml"

          # Test lowest and highest versions on Mac.
          - runner: "macos-latest"
            cpythons:
              - "3.10"
              - "3.14"
            tox-environments:
              - "py3.10"
              - "py3.14"

          # Test lowest and highest versions on Windows.
          - runner: "windows-latest"
            cpythons:
              - "3.10"
              - "3.14"
            tox-environments:
              - "py3.10"
              - "py3.14"

    uses: "kurtmckee/github-workflows/.github/workflows/tox.yaml@19c3c069be51d3bfc3ac73e85e81b2b1646e91a8" # v1.7
    with:
      config: "${{ toJSON(matrix) }}"
